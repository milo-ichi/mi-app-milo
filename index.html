<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MILO APP PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f4f7;
}

h2{margin:10px;}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ddd;
width:90%;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#2ecc71;
color:white;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
}

.card{
background:white;
padding:12px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;
}

img{
width:80px;
height:80px;
border-radius:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
border-top:1px solid #ccc;
}

.bottom-nav button{
flex:1;
background:none;
}

.content{
padding:15px;
padding-bottom:90px;
}
</style>
</head>

<body>

<div class="content">

<div id="loginDiv">
<h2>🔐 Iniciar sesión</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>
</div>

<div id="app" style="display:none;">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>📊 Dashboard</h2>
<p>Ventas: <span id="ventas">0</span></p>
<p>Gastos: <span id="gastos">0</span></p>
<p>Ganancia: <span id="ganancia">0</span></p>

<canvas id="grafico" height="120"></canvas>

<h3>👑 Creador MILO</h3>
</div>

<!-- HISTORIAL -->
<div id="historial" style="display:none;">
<h2>📜 Historial</h2>

<button onclick="cambiarFiltro('hoy')">Hoy</button>
<button onclick="cambiarFiltro('semana')">Semana</button>
<button onclick="cambiarFiltro('mes')">Mes</button>
<button onclick="cambiarFiltro('todo')">Todo</button>

<div id="listaHistorial"></div>
</div>

<!-- VENDER -->
<div id="vender" style="display:none;">
<h2>💰 Vender</h2>
<input id="buscar" placeholder="Buscar..." oninput="filtrar()">
<div class="grid" id="productosVenta"></div>
</div>

<!-- INVENTARIO -->
<div id="inventario" style="display:none;">
<h2>📦 Inventario</h2>

<input id="producto" placeholder="Nombre">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Compra">
<input id="venta" type="number" placeholder="Venta">
<input type="file" id="imagen">

<button onclick="agregar()">Agregar</button>

<div class="grid" id="tabla"></div>
</div>

</div>
</div>

<div class="bottom-nav">
<button onclick="mostrar('dashboard')">📊</button>
<button onclick="mostrar('vender')">💰</button>
<button onclick="mostrar('inventario')">📦</button>
<button onclick="mostrar('historial')">📜</button>
<button onclick="logout()">🚪</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDA0CoWdCAYTLEwgfBcyX6SHr5bwEf4tJc",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let filtro="todo";
let chart=null;
let userId=null;

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
loginDiv.style.display="none";
app.style.display="block";
cargar();
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function registrar(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){
if(confirm("¿Cerrar sesión?")){
auth.signOut();
location.reload();
}
}

function mostrar(id){
["dashboard","vender","inventario","historial"].forEach(s=>{
document.getElementById(s).style.display="none";
});
document.getElementById(id).style.display="block";
}

function cambiarFiltro(f){
filtro=f;
cargarHistorial();
}

async function agregar(){
let file=imagen.files[0];
let img="";

if(file){
let reader=new FileReader();
reader.readAsDataURL(file);
await new Promise(r=>reader.onload=()=>{img=reader.result;r();});
}

db.collection("productos").add({
userId,
nombre:producto.value,
cantidad:Number(cantidad.value)||0,
compra:Number(compra.value)||0,
venta:Number(venta.value)||0,
imagen:img
});

alert("Producto agregado");

producto.value="";
cantidad.value="";
compra.value="";
venta.value="";
imagen.value="";

cargar();
}

function venderProducto(id,venta,nombre,compra){
if(confirm("¿Confirmar venta?")){
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();

if(d.cantidad>0){
db.collection("productos").doc(id).update({cantidad:d.cantidad-1});

db.collection("movimientos").add({
userId,
tipo:"venta",
monto:Number(venta)||0,
ganancia:(Number(venta)||0)-(Number(compra)||0),
fecha:Date.now(),
nombre:nombre
});

cargar();
}
});
}
}

function comprar(id,precio){
let c=Number(prompt("Cantidad"))||0;

db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();

db.collection("productos").doc(id).update({
cantidad:d.cantidad+c
});

db.collection("movimientos").add({
userId,
tipo:"gasto",
monto:(Number(precio)||0)*c,
fecha:Date.now()
});

cargar();
});
}

function eliminar(id){
if(confirm("¿Eliminar producto?")){
db.collection("productos").doc(id).delete();
cargar();
}
}

function cargar(){
db.collection("productos").where("userId","==",userId).get().then(snap=>{
tabla.innerHTML="";
productosVenta.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

tabla.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
Stock: ${d.cantidad}<br>
<button onclick="comprar('${doc.id}',${d.compra})">+ Stock</button>
<button onclick="eliminar('${doc.id}')">❌</button>
</div>`;

productosVenta.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
S/ ${d.venta}<br>
Stock: ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}',${d.compra})">Vender</button>
</div>`;
});

calcular();
grafica();
cargarHistorial();
});
}

function calcular(){
db.collection("movimientos").where("userId","==",userId).get().then(snap=>{
let ventasTotal=0;
let gastosTotal=0;
let gananciaTotal=0;

snap.forEach(doc=>{
let d=doc.data();

if(d.tipo=="venta"){
ventasTotal+=Number(d.monto)||0;
gananciaTotal+=Number(d.ganancia)||0;
}else if(d.tipo=="gasto"){
gastosTotal+=Number(d.monto)||0;
}
});

ventas.innerText=ventasTotal;
gastos.innerText=gastosTotal;
ganancia.innerText=gananciaTotal;
});
}

function grafica(){
db.collection("movimientos").where("userId","==",userId).get().then(snap=>{
let datos={};

snap.forEach(doc=>{
let d=doc.data();

if(d.tipo=="venta"){
let fecha=new Date(d.fecha).toLocaleDateString();
datos[fecha]=(datos[fecha]||0)+Number(d.monto||0);
}
});

let labels=Object.keys(datos);
let valores=Object.values(datos);

if(chart) chart.destroy();

chart=new Chart(grafico,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Ventas",
data:valores,
tension:0.4
}]
}
});
});
}

function cargarHistorial(){
db.collection("movimientos").where("userId","==",userId).get().then(snap=>{
listaHistorial.innerHTML="";
let now=Date.now();

snap.forEach(doc=>{
let d=doc.data();
let diff=now-(d.fecha||0);

if(filtro=="hoy" && diff>86400000) return;
if(filtro=="semana" && diff>604800000) return;
if(filtro=="mes" && diff>2592000000) return;

listaHistorial.innerHTML+=`
<div class="card">
<b>${d.nombre||d.tipo}</b><br>
${d.tipo} - S/ ${d.monto}
</div>`;
});
});
}

function filtrar(){
let t=buscar.value.toLowerCase();

db.collection("productos").where("userId","==",userId).get().then(snap=>{
productosVenta.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

if(d.nombre.toLowerCase().includes(t)){
productosVenta.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
S/ ${d.venta}<br>
Stock: ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}',${d.compra})">Vender</button>
</div>`;
}
});
});
}
</script>

</body>
</html>

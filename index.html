<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILO APP PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f4f7;
color:#000;
transition:0.3s;
}

.dark{
background:#121212;
color:#fff;
}

.card{
background:white;
padding:12px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin:10px 0;
}

.dark .card{
background:#1e1e1e;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#2ecc71;
color:white;
}

input{
padding:10px;
margin:5px;
width:90%;
border-radius:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
}

.dark .bottom-nav{
background:#1e1e1e;
}

.bottom-nav button{
flex:1;
background:none;
}

#ticket{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px;
display:none;
}

.dark #ticket{
background:#1e1e1e;
}
</style>
</head>

<body>

<div id="loginDiv">
<h2>Login</h2>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>
</div>

<div id="app" style="display:none; padding:10px;">

<h2>Dashboard</h2>
<p>Ventas: <span id="ventas">0</span></p>
<p>Ganancia Total: <span id="ganancia">0</span></p>
<p>Hoy: <span id="gananciaHoy">0</span></p>
<p>Mes: <span id="gananciaMes">0</span></p>
<p>🔥 Top: <span id="topProducto">-</span></p>

<button onclick="toggleDark()">🌙 Modo oscuro</button>

<h3>Inventario</h3>

<input id="producto" placeholder="Nombre">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Compra">
<input id="venta" type="number" placeholder="Venta">
<input type="file" id="imagen">

<button onclick="agregar()">Agregar</button>

<div id="tabla"></div>

<h3>Vender</h3>
<input id="buscar" oninput="filtrar()">
<div id="productosVenta"></div>

</div>

<div id="ticket">
<div id="ticketContenido"></div>
<button onclick="descargarPDF()">PDF</button>
<button onclick="cerrarTicket()">Cerrar</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDA0CoWdCAYTLEwgfBcyX6SHr5bwEf4tJc",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let userId=null;
let ticketData=null;

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
loginDiv.style.display="none";
app.style.display="block";
cargar();
}
});

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")=="true"){
document.body.classList.add("dark");
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function registrar(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

async function agregar(){
let file=imagen.files[0];
let img="";

if(file){
let reader=new FileReader();
reader.readAsDataURL(file);
await new Promise(r=>reader.onload=()=>{img=reader.result;r();});
}

db.collection("productos").add({
userId,
nombre:producto.value,
cantidad:Number(cantidad.value)||0,
compra:Number(compra.value)||0,
venta:Number(venta.value)||0,
imagen:img
});

producto.value="";
cantidad.value="";
compra.value="";
venta.value="";
imagen.value="";
cargar();
}

function venderProducto(id,venta,nombre,compra){
if(confirm("Confirmar venta?")){
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();

if(d.cantidad>0){
db.collection("productos").doc(id).update({cantidad:d.cantidad-1});

db.collection("movimientos").add({
userId,
tipo:"venta",
monto:Number(venta)||0,
ganancia:(Number(venta)||0)-(Number(compra)||0),
fecha:Date.now(),
nombre
});

mostrarTicket(nombre,venta);
cargar();
}
});
}
}

function mostrarTicket(nombre,precio){
let fecha=new Date().toLocaleString();

ticketContenido.innerHTML=`
<b>MILO STORE</b><br>
${fecha}<br><br>
${nombre}<br>
S/ ${precio}<br><br>
TOTAL: S/ ${precio}<br>
`;

ticket.style.display="block";

ticketData={nombre,precio,fecha};
}

function cerrarTicket(){
ticket.style.display="none";
}

function descargarPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text(`MILO STORE\n${ticketData.fecha}\n\n${ticketData.nombre}\nS/ ${ticketData.precio}\n\nTOTAL: S/ ${ticketData.precio}`,10,10);

doc.save("comprobante.pdf");
}

function cargar(){
db.collection("productos").where("userId","==",userId).get().then(snap=>{
tabla.innerHTML="";
productosVenta.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

tabla.innerHTML+=`
<div class="card">
${d.nombre}<br>
<span style="color:${d.cantidad<=3?'red':'black'}">
Stock: ${d.cantidad}
</span><br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}',${d.compra})">Vender</button>
</div>`;
});

productosVenta.innerHTML=tabla.innerHTML;

calcular();
});
}

function calcular(){
db.collection("movimientos").where("userId","==",userId).get().then(snap=>{
let v=0,gan=0,hoy=0,mes=0;
let conteo={};
let now=new Date();

snap.forEach(doc=>{
let d=doc.data();
let f=new Date(d.fecha);

if(d.tipo=="venta"){
v+=Number(d.monto)||0;
gan+=Number(d.ganancia)||0;

if(f.toDateString()==now.toDateString()){
hoy+=d.ganancia||0;
}
if(f.getMonth()==now.getMonth()){
mes+=d.ganancia||0;
}

conteo[d.nombre]=(conteo[d.nombre]||0)+1;
}
});

ventas.innerText=v;
ganancia.innerText=gan;
gananciaHoy.innerText=hoy;
gananciaMes.innerText=mes;

let top=Object.entries(conteo).sort((a,b)=>b[1]-a[1])[0];
topProducto.innerText=top?top[0]:"-";
});
}

function filtrar(){
let t=buscar.value.toLowerCase();

db.collection("productos").where("userId","==",userId).get().then(snap=>{
productosVenta.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

if(d.nombre.toLowerCase().includes(t)){
productosVenta.innerHTML+=`
<div class="card">
${d.nombre}<br>
Stock: ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}',${d.compra})">Vender</button>
</div>`;
}
});
});
}
</script>

</body>
</html>

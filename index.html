<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILO APP PRO</title>

<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa;}
h2{font-size:22px;}
input,button{padding:10px;margin:5px;border-radius:10px;border:none;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}

.product{
background:#fff;padding:10px;border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

img{width:90px;height:90px;border-radius:10px;}

.bottom-nav{
position:fixed;bottom:0;width:100%;height:70px;
display:flex;background:#fff;border-top:1px solid #ccc;
}

.bottom-nav button{flex:1;background:none;}

.content{padding:15px;padding-bottom:90px;}
</style>
</head>

<body>

<div class="content">

<!-- LOGIN -->
<div id="loginDiv">
<h2>🔐 Iniciar sesión</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>📊 Dashboard</h2>
<p>💰 Ventas: <span id="ventas">0</span></p>
<p>💸 Gastos: <span id="gastos">0</span></p>
<p>📈 Ganancia: <span id="ganancia">0</span></p>

<h3>👑 Creador MILO</h3>
</div>

<!-- HISTORIAL -->
<div id="historial" style="display:none;">
<h2>📜 Historial</h2>
<div id="listaHistorial"></div>
</div>

<!-- DEUDAS -->
<div id="deudas" style="display:none;">
<h2>💳 Deudas</h2>

<button onclick="tipoDeuda='cobrar'">Por cobrar</button>
<button onclick="tipoDeuda='pagar'">Por pagar</button>

<input id="cliente" placeholder="Nombre">
<input id="monto" type="number" placeholder="Monto">
<button onclick="agregarDeuda()">Guardar</button>

<div id="listaDeudas"></div>
</div>

<!-- VENDER -->
<div id="vender" style="display:none;">
<h2>💰 Vender</h2>
<input id="buscar" placeholder="Buscar..." oninput="filtrar()">
<div class="grid" id="productosVenta"></div>
</div>

<!-- INVENTARIO -->
<div id="inventario" style="display:none;">
<h2>📦 Inventario</h2>

<input id="producto" placeholder="Nombre">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Compra">
<input id="venta" type="number" placeholder="Venta">
<input type="file" id="imagen">
<button onclick="agregar()">Agregar</button>
<button onclick="generarPDF()">📄 PDF</button>

<div class="grid" id="tabla"></div>
</div>

</div>
</div>

<!-- MENU -->
<div class="bottom-nav">
<button onclick="mostrar('dashboard')">📊</button>
<button onclick="mostrar('vender')">💰</button>
<button onclick="mostrar('inventario')">📦</button>
<button onclick="mostrar('historial')">📜</button>
<button onclick="mostrar('deudas')">💳</button>
<button onclick="cerrarSesion()">🚪</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDA0CoWdCAYTLEwgfBcyX6SHr5bwEf4tJc",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};
firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let tipoDeuda="cobrar";

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginDiv.style.display="none";
app.style.display="block";
cargar();
})
.catch(e=>alert(e.message));
}

function registrar(){
auth.createUserWithEmailAndPassword(email.value,password.value);
}

function cerrarSesion(){
if(confirm("¿Cerrar sesión?")){
auth.signOut();
location.reload();
}
}

function mostrar(id){
["dashboard","vender","inventario","historial","deudas"].forEach(s=>{
document.getElementById(s).style.display="none";
});
document.getElementById(id).style.display="block";
}

function convertirBase64(file){
return new Promise(res=>{
const r=new FileReader();
r.readAsDataURL(file);
r.onload=()=>res(r.result);
});
}

async function agregar(){
let file=imagen.files[0];
let img="";
if(file){img=await convertirBase64(file);}

db.collection("productos").add({
nombre:producto.value,
cantidad:Number(cantidad.value)||0,
compra:Number(compra.value)||0,
venta:Number(venta.value)||0,
imagen:img
});

alert("Producto agregado");

producto.value="";
cantidad.value="";
compra.value="";
venta.value="";
imagen.value="";

cargar();
}

function eliminar(id){
if(confirm("¿Eliminar producto?")){
db.collection("productos").doc(id).delete();
cargar();
}
}

function venderProducto(id,venta){
if(confirm("¿Confirmar venta?")){
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();
if(d.cantidad>0){
db.collection("productos").doc(id).update({cantidad:d.cantidad-1});
db.collection("movimientos").add({
tipo:"venta",
monto:Number(venta)||0,
fecha:new Date().toLocaleString()
});
cargar();
}
});
}
}

function agregarDeuda(){
db.collection("deudas").add({
cliente:cliente.value,
monto:Number(monto.value),
tipo:tipoDeuda
});
cliente.value="";
monto.value="";
cargar();
}

function cargar(){
db.collection("productos").get().then(snap=>{
productosVenta.innerHTML="";
tabla.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

productosVenta.innerHTML+=`
<div class="product">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
💰 ${d.venta}<br>
📦 ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta})">Vender</button>
</div>`;

tabla.innerHTML+=`
<div class="product">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
💸 ${d.compra}<br>
💰 ${d.venta}<br>
📦 ${d.cantidad}<br>
<button onclick="eliminar('${doc.id}')">❌</button>
</div>`;
});

calcular();
});

db.collection("movimientos").get().then(snap=>{
listaHistorial.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
listaHistorial.innerHTML+=`<div class="product">Venta S/ ${d.monto}<br>${d.fecha}</div>`;
});
});

db.collection("deudas").get().then(snap=>{
listaDeudas.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
listaDeudas.innerHTML+=`<div class="product">${d.cliente} - S/ ${d.monto} (${d.tipo})</div>`;
});
});
}

function calcular(){
db.collection("movimientos").get().then(snap=>{
let v=0,g=0;
snap.forEach(doc=>{
let d=doc.data();
if(d.tipo=="venta") v+=Number(d.monto)||0;
});
ventas.innerText=v;
gastos.innerText=g;
ganancia.innerText=v-g;
});
}

function filtrar(){
let t=buscar.value.toLowerCase();
db.collection("productos").get().then(snap=>{
productosVenta.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
if(d.nombre.toLowerCase().includes(t)){
productosVenta.innerHTML+=`
<div class="product">
<b>${d.nombre}</b><br>
💰 ${d.venta}<br>
📦 ${d.cantidad}
</div>`;
}
});
});
}

async function generarPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let x=10,y=10,count=0;

let productos=await db.collection("productos").get();

for(const item of productos.docs){
let d=item.data();

doc.text(d.nombre,x,y);
if(d.imagen) doc.addImage(d.imagen,"JPEG",x,y+5,40,40);

x+=90;
count++;

if(count%2==0){x=10;y+=60;}
if(count%4==0){doc.addPage();x=10;y=10;}
}

doc.save("catalogo.pdf");
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>

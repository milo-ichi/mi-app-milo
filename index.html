<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILO APP</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f4f7;color:#000;}
h2{margin:10px;}

input{
  padding:10px;margin:5px;border-radius:10px;border:1px solid #ddd;width:90%;
}

button{
  padding:10px;margin:5px;border:none;border-radius:10px;background:#2ecc71;color:white;font-weight:bold;
}

.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;
}

.card{
  background:white;padding:12px;border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);text-align:center;
}

img{width:80px;height:80px;border-radius:10px;}

.bottom-nav{
  position:fixed;bottom:0;width:100%;display:flex;background:white;border-top:1px solid #ccc;
}
.bottom-nav button{flex:1;background:none;}

.content{padding:15px;padding-bottom:90px;}

/* 🌙 DARK MODE */
.dark{background:#121212;color:white;}
.dark .card{background:#1e1e1e;}
.dark input{background:#2a2a2a;color:white;border:1px solid #444;}
.dark .bottom-nav{background:#1e1e1e;}
.dark button{background:#27ae60;}
</style>
</head>

<body>

<div class="content">

<div id="loginDiv">
<h2>🔐 Iniciar sesión</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>
</div>

<div id="app" style="display:none;">

<div id="dashboard">
<h2>📊 Dashboard</h2>
<p>Ventas: <span id="ventas">0</span></p>
<p>Ganancia Total: <span id="ganancia">0</span></p>
<p>Ganancia Hoy: <span id="gananciaHoy">0</span></p>

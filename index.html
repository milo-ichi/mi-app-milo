<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MILO APP PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f4f7;color:#000;}
h2{margin:10px;}

input{padding:10px;margin:5px;border-radius:10px;border:1px solid #ddd;width:90%;}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#2ecc71;color:white;font-weight:bold;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}

.card{
background:white;padding:12px;border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;
}

img{width:80px;height:80px;border-radius:10px;}

.bottom-nav{
position:fixed;bottom:0;width:100%;display:flex;background:white;border-top:1px solid #ccc;
}
.bottom-nav button{flex:1;background:none;}

.content{padding:15px;padding-bottom:100px;}

/* ticket */
#ticket{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:15px;
border-top:3px solid #2ecc71;
display:none;
}

.ticket-box{
font-family:monospace;
border:1px dashed black;
padding:10px;
}

/* dark */
.dark{background:#121212;color:white;}
.dark .card{background:#1e1e1e;}
.dark input{background:#2a2a2a;color:white;}
.dark .bottom-nav{background:#1e1e1e;}
.dark #ticket{background:#1e1e1e;}
</style>
</head>

<body>

<div class="content">

<div id="loginDiv">
<h2>🔐 Iniciar sesión</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>
</div>

<div id="app" style="display:none;">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>📊 Dashboard</h2>
<p>Ventas: <span id="ventas">0</span></p>
<p>Gastos: <span id="gastos">0</span></p>
<p>Ganancia: <span id="ganancia">0</span></p>
<button onclick="toggleDark()">🌙</button>
</div>

<!-- VENDER -->
<div id="vender" style="display:none;">
<h2>💰 Vender</h2>
<input id="buscar" placeholder="Buscar producto..." oninput="filtrar()">
<div class="grid" id="productosVenta"></div>
</div>

<!-- INVENTARIO -->
<div id="inventario" style="display:none;">
<h2>📦 Inventario</h2>

<input id="producto" placeholder="Nombre">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Precio compra">
<input id="venta" type="number" placeholder="Precio venta">
<input type="file" id="imagen">

<button onclick="agregar()">Agregar</button>

<div class="grid" id="tabla"></div>
</div>

</div>
</div>

<!-- ticket visual -->
<div id="ticket">
<div class="ticket-box" id="ticketContenido"></div>
<button onclick="descargarPDF()">Descargar PDF</button>
<button onclick="cerrarTicket()">Cerrar</button>
</div>

<div class="bottom-nav">
<button onclick="mostrar('dashboard')">📊</button>
<button onclick="mostrar('vender')">💰</button>
<button onclick="mostrar('inventario')">📦</button>
<button onclick="logout()">🚪</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDA0CoWdCAYTLEwgfBcyX6SHr5bwEf4tJc",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let userId=null;
let ticketData=null;

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
loginDiv.style.display="none";
app.style.display="block";
cargar();
}
});

function login(){
let correo=document.getElementById("email").value;
let pass=document.getElementById("password").value;
auth.signInWithEmailAndPassword(correo,pass)
.catch(e=>alert(e.message));
}

function registrar(){
let correo=document.getElementById("email").value;
let pass=document.getElementById("password").value;
auth.createUserWithEmailAndPassword(correo,pass)
.catch(e=>alert(e.message));
}

function logout(){
if(confirm("¿Cerrar sesión?")){
auth.signOut();
location.reload();
}
}

function mostrar(id){
["dashboard","vender","inventario"].forEach(s=>{
document.getElementById(s).style.display="none";
});
document.getElementById(id).style.display="block";
}

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
}
if(localStorage.getItem("dark")=="true"){
document.body.classList.add("dark");
}

async function agregar(){
let file=imagen.files[0];
let img="";

if(file){
let reader=new FileReader();
reader.readAsDataURL(file);
await new Promise(r=>reader.onload=()=>{img=reader.result;r();});
}

db.collection("productos").add({
userId,
nombre:producto.value,
cantidad:Number(cantidad.value)||0,
compra:Number(compra.value)||0,
venta:Number(venta.value)||0,
imagen:img
});

producto.value="";cantidad.value="";compra.value="";venta.value="";
cargar();
}

function aumentarStock(id){
let c=Number(prompt("Cantidad a agregar"))||0;

db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();
db.collection("productos").doc(id).update({
cantidad:d.cantidad+c
});
cargar();
});
}

function eliminar(id){
if(confirm("¿Eliminar producto?")){
db.collection("productos").doc(id).delete();
cargar();
}
}

function venderProducto(id,venta,nombre,compra){
if(confirm("¿Confirmar venta?")){
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();

if(d.cantidad>0){
db.collection("productos").doc(id).update({cantidad:d.cantidad-1});

db.collection("movimientos").add({
userId,
tipo:"venta",
monto:Number(venta)||0,
ganancia:(Number(venta)||0)-(Number(compra)||0),
fecha:Date.now(),
nombre
});

mostrarTicket(nombre,venta);

cargar();
}
});
}
}

function mostrarTicket(nombre,precio){
let fecha=new Date().toLocaleString();

ticketData={nombre,precio,fecha};

ticketContenido.innerHTML=`
======== MILO STORE ========<br><br>
Fecha: ${fecha}<br><br>
Producto: ${nombre}<br>
Cantidad: 1<br>
Precio: S/ ${precio}<br>
---------------------------<br>
TOTAL: S/ ${precio}<br>
---------------------------<br>
Estado: PAGADO
`;

ticket.style.display="block";
}

function cerrarTicket(){
ticket.style.display="none";
}

function descargarPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.setFont("courier");
doc.text(ticketContenido.innerText,10,10);
doc.save("comprobante.pdf");
}

function cargar(){
db.collection("productos").where("userId","==",userId).get().then(snap=>{
tabla.innerHTML="";
productosVenta.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

tabla.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
Stock: ${d.cantidad}<br>
<button onclick="aumentarStock('${doc.id}')">➕</button>
<button onclick="eliminar('${doc.id}')">❌</button>
</div>`;

productosVenta.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
S/ ${d.venta}<br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}',${d.compra})">Vender</button>
</div>`;
});

calcular();
});
}

function calcular(){
db.collection("movimientos").where("userId","==",userId).get().then(snap=>{
let ventasTotal=0;
let gastosTotal=0;
let gananciaTotal=0;

snap.forEach(doc=>{
let d=doc.data();

if(d.tipo=="venta"){
ventasTotal+=Number(d.monto)||0;
gananciaTotal+=Number(d.ganancia)||0;
}else{
gastosTotal+=Number(d.monto)||0;
}
});

ventas.innerText=ventasTotal;
gastos.innerText=gastosTotal;
ganancia.innerText=gananciaTotal;
});
}

function filtrar(){
let t=buscar.value.toLowerCase();

db.collection("productos").where("userId","==",userId).get().then(snap=>{
productosVenta.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

if(d.nombre.toLowerCase().includes(t)){
productosVenta.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
S/ ${d.venta}<br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}',${d.compra})">Vender</button>
</div>`;
}
});
});
}
</script>

</body>
</html>

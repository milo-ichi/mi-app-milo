<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILO APP PRO</title>

<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa;}
.layout{display:flex;height:100vh;}

.sidebar{width:220px;background:#fff;padding:15px;border-right:1px solid #ddd;}
.content{flex:1;padding:15px;overflow:auto;}

.product{
background:#fff;
padding:10px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

img{width:80px;height:80px;border-radius:10px;}

.bottom-nav{
display:none;
}

@media(max-width:768px){

.sidebar{display:none;}

.bottom-nav{
display:flex;
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#fff;
border-top:1px solid #ddd;
justify-content:space-around;
align-items:center;
}

.bottom-nav button{
flex:1;
height:100%;
border:none;
background:none;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.content{padding-bottom:80px;}
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
<h2>💼 MILO</h2>
<button onclick="mostrar('dashboard')">Inicio</button>
<button onclick="mostrar('vender')">Vender</button>
<button onclick="mostrar('inventario')">Inventario</button>
</div>

<div class="content">

<div id="login">
<input id="email" placeholder="Correo"><br>
<input id="password" placeholder="Contraseña"><br>
<button onclick="loginUser()">Entrar</button>
</div>

<div id="app" style="display:none;">

<div id="dashboard">
<h3>Panel</h3>
<p id="balance">0</p>
</div>

<div id="vender" style="display:none;">
<input id="buscar" placeholder="Buscar..." oninput="filtrar()">
<div class="grid" id="productosVenta"></div>
</div>

<div id="inventario" style="display:none;">
<input id="producto" placeholder="Nombre">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Precio compra">
<input id="venta" type="number" placeholder="Precio venta">
<input type="file" id="imagen">
<button onclick="agregar()">Agregar</button>

<div id="tabla"></div>
</div>

</div>
</div>
</div>

<!-- MENU ABAJO -->
<div class="bottom-nav">
<button onclick="mostrar('dashboard')">📊 Inicio</button>
<button onclick="mostrar('vender')">💰 Vender</button>
<button onclick="mostrar('inventario')">📦 Stock</button>
<button onclick="logout()">🚪 Salir</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};
firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

function loginUser(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
login.style.display="none";
app.style.display="block";
cargar();
});
}

function logout(){
auth.signOut();
location.reload();
}

function mostrar(id){
dashboard.style.display="none";
vender.style.display="none";
inventario.style.display="none";
document.getElementById(id).style.display="block";
}

function convertirBase64(file){
return new Promise(res=>{
const r=new FileReader();
r.readAsDataURL(file);
r.onload=()=>res(r.result);
});
}

async function agregar(){
let file=imagen.files[0];
let img="";
if(file){img=await convertirBase64(file);}

db.collection("productos").add({
nombre:producto.value,
cantidad:Number(cantidad.value),
compra:Number(compra.value),
venta:Number(venta.value),
imagen:img
});
cargar();
}

function cargar(){
db.collection("productos").get().then(snap=>{
productosVenta.innerHTML="";
tabla.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

productosVenta.innerHTML+=`
<div class="product">
<img src="${d.imagen||'https://via.placeholder.com/100'}"><br>
<b>${d.nombre}</b><br>
💰 Venta: S/ ${d.venta}<br>
📦 Stock: ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta})">Vender</button>
</div>`;

tabla.innerHTML+=`
<div class="product">
<b>${d.nombre}</b><br>
💸 Compra: S/ ${d.compra}<br>
💰 Venta: S/ ${d.venta}<br>
📦 Stock: ${d.cantidad}<br>
<button onclick="comprar('${doc.id}',${d.compra})">+ Comprar</button>
</div>`;
});
});
}

function venderProducto(id,venta){
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();
if(d.cantidad>0){
db.collection("productos").doc(id).update({cantidad:d.cantidad-1});
cargar();
}
});
}

function comprar(id,precio){
let c=Number(prompt("Cantidad"));
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();
db.collection("productos").doc(id).update({cantidad:d.cantidad+c});
cargar();
});
}

function filtrar(){
let t=buscar.value.toLowerCase();
db.collection("productos").get().then(snap=>{
productosVenta.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
if(d.nombre.toLowerCase().includes(t)){
productosVenta.innerHTML+=`
<div class="product">
<b>${d.nombre}</b><br>
💰 ${d.venta}<br>
📦 ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta})">Vender</button>
</div>`;
}
});
});
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MILO APP PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}

h2{margin:5px;}

input,select{
padding:10px;margin:5px;border-radius:10px;border:1px solid #ddd;width:90%;
}

button{
padding:10px;margin:5px;border:none;border-radius:10px;
background:#2ecc71;color:white;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
}

.card{
background:white;
padding:12px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;
transition:0.2s;
}
.card:hover{transform:scale(1.03);}

img{width:80px;height:80px;border-radius:10px;}

.bottom-nav{
position:fixed;bottom:0;width:100%;display:flex;background:white;
border-top:1px solid #ccc;
}
.bottom-nav button{flex:1;background:none;}

.content{padding:15px;padding-bottom:90px;}
</style>
</head>

<body>

<div class="content">

<div id="loginDiv">
<h2>🔐 Login</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>
</div>

<div id="app" style="display:none;">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>📊 Dashboard</h2>
<p>Ventas: <span id="ventas">0</span></p>
<p>Gastos: <span id="gastos">0</span></p>
<p>Ganancia: <span id="ganancia">0</span></p>

<canvas id="grafico" height="120"></canvas>

<h3>👑 Creador MILO</h3>
</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none;">
<h2>👥 Clientes</h2>

<input id="nombreCliente" placeholder="Nombre">
<input id="deudaCliente" type="number" placeholder="Monto">
<button onclick="guardarCliente()">Guardar</button>

<div id="listaClientes"></div>
</div>

<!-- VENDER -->
<div id="vender" style="display:none;">
<h2>💰 Vender</h2>

<select id="clienteSelect">
<option value="">Venta normal</option>
</select>

<input id="buscar" placeholder="Buscar..." oninput="filtrar()">

<div class="grid" id="productosVenta"></div>
</div>

<!-- INVENTARIO -->
<div id="inventario" style="display:none;">
<h2>📦 Inventario</h2>

<input id="producto" placeholder="Nombre">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Compra">
<input id="venta" type="number" placeholder="Venta">
<input type="file" id="imagen">

<button onclick="agregar()">Agregar</button>

<div class="grid" id="tabla"></div>
</div>

</div>
</div>

<div class="bottom-nav">
<button onclick="mostrar('dashboard')">📊</button>
<button onclick="mostrar('vender')">💰</button>
<button onclick="mostrar('inventario')">📦</button>
<button onclick="mostrar('clientes')">👥</button>
<button onclick="logout()">🚪</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDA0CoWdCAYTLEwgfBcyX6SHr5bwEf4tJc",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let userId=null;

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
loginDiv.style.display="none";
app.style.display="block";
cargar();
cargarClientes();
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function registrar(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
location.reload();
}

function mostrar(id){
["dashboard","vender","inventario","clientes"].forEach(s=>{
document.getElementById(s).style.display="none";
});
document.getElementById(id).style.display="block";
}

async function agregar(){
let file=imagen.files[0];
let img="";

if(file){
let reader=new FileReader();
reader.readAsDataURL(file);
await new Promise(r=>reader.onload=()=>{img=reader.result;r();});
}

db.collection("productos").add({
userId,
nombre:producto.value,
cantidad:Number(cantidad.value)||0,
compra:Number(compra.value)||0,
venta:Number(venta.value)||0,
imagen:img
});

producto.value="";cantidad.value="";compra.value="";venta.value="";
cargar();
}

function venderProducto(id,venta,nombre,compra){
let clienteId=clienteSelect.value;

if(confirm("¿Confirmar venta?")){
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();

if(d.cantidad>0){
db.collection("productos").doc(id).update({cantidad:d.cantidad-1});

db.collection("movimientos").add({
userId,
tipo:"venta",
monto:venta,
ganancia:venta-compra,
fecha:Date.now(),
nombre
});

if(clienteId){
db.collection("clientes").doc(clienteId).get().then(c=>{
let deuda=c.data().deuda||0;
db.collection("clientes").doc(clienteId).update({
deuda:deuda+venta
});
});
}

cargar();
}
});
}
}

function cargar(){
db.collection("productos").where("userId","==",userId).get().then(snap=>{
tabla.innerHTML="";
productosVenta.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

tabla.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
Stock: ${d.cantidad}<br>
<button onclick="comprar('${doc.id}',${d.compra})">+ Stock</button>
<button onclick="eliminar('${doc.id}')">❌</button>
</div>`;

productosVenta.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
S/ ${d.venta}<br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}',${d.compra})">Vender</button>
</div>`;
});

calcular();
});
}

function calcular(){
db.collection("movimientos").where("userId","==",userId).get().then(snap=>{
let v=0,g=0,gan=0;

snap.forEach(doc=>{
let d=doc.data();
v+=Number(d.monto)||0;
if(d.tipo=="gasto") g+=Number(d.monto)||0;
gan+=Number(d.ganancia)||0;
});

ventas.innerText=v;
gastos.innerText=g;
ganancia.innerText=gan;
});
}

function guardarCliente(){
db.collection("clientes").add({
userId,
nombre:nombreCliente.value,
deuda:Number(deudaCliente.value)||0
});
cargarClientes();
}

function cargarClientes(){
db.collection("clientes").where("userId","==",userId).get().then(snap=>{
listaClientes.innerHTML="";
clienteSelect.innerHTML='<option value="">Venta normal</option>';

snap.forEach(doc=>{
let d=doc.data();

listaClientes.innerHTML+=`
<div class="card">
${d.nombre}<br>
Debe: ${d.deuda}<br>
<button onclick="pagar('${doc.id}')">Ya pagó</button>
</div>`;

clienteSelect.innerHTML+=`<option value="${doc.id}">${d.nombre}</option>`;
});
});
}

function pagar(id){
if(confirm("¿Confirmar pago?")){
db.collection("clientes").doc(id).delete();
cargarClientes();
}
}
</script>

</body>
</html>

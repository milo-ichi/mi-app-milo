<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILO APP PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa;}
h2{font-size:22px;}

input,button{
padding:10px;margin:5px;border-radius:10px;border:none;
}

button{background:#4CAF50;color:white;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
text-align:center;
}

img{width:80px;height:80px;border-radius:10px;}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
height:70px;
display:flex;
background:white;
border-top:1px solid #ccc;
}

.bottom-nav button{flex:1;background:none;}

.content{padding:15px;padding-bottom:90px;}
</style>
</head>

<body>

<div class="content">

<div id="loginDiv">
<h2>🔐 Iniciar sesión</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>
</div>

<div id="app" style="display:none;">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>📊 Dashboard</h2>
<p>Ventas: <span id="ventas">0</span></p>
<p>Gastos: <span id="gastos">0</span></p>
<p>Ganancia: <span id="ganancia">0</span></p>
<h3>👑 Creador MILO</h3>
</div>

<!-- HISTORIAL -->
<div id="historial" style="display:none;">
<h2>📜 Historial</h2>

<button onclick="filtro='hoy';cargar()">Hoy</button>
<button onclick="filtro='semana';cargar()">Semana</button>
<button onclick="filtro='mes';cargar()">Mes</button>
<button onclick="filtro='todo';cargar()">Todo</button>

<div id="listaHistorial"></div>
</div>

<!-- CLIENTES / DEUDAS -->
<div id="clientes" style="display:none;">
<h2>👥 Clientes / Deudas</h2>

<input id="nombreCliente" placeholder="Nombre">
<input id="deudaCliente" type="number" placeholder="Monto">
<button onclick="guardarCliente()">Guardar</button>

<div id="listaClientes"></div>
</div>

<!-- VENDER -->
<div id="vender" style="display:none;">
<h2>💰 Vender</h2>
<input id="buscar" placeholder="Buscar..." oninput="filtrar()">
<div class="grid" id="productosVenta"></div>
</div>

<!-- INVENTARIO -->
<div id="inventario" style="display:none;">
<h2>📦 Inventario</h2>

<input id="producto" placeholder="Nombre">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Compra">
<input id="venta" type="number" placeholder="Venta">
<input type="file" id="imagen">

<button onclick="agregar()">Agregar</button>

<div class="grid" id="tabla"></div>
</div>

</div>
</div>

<!-- MENU -->
<div class="bottom-nav">
<button onclick="mostrar('dashboard')">📊</button>
<button onclick="mostrar('vender')">💰</button>
<button onclick="mostrar('inventario')">📦</button>
<button onclick="mostrar('historial')">📜</button>
<button onclick="mostrar('clientes')">👥</button>
<button onclick="logout()">🚪</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDA0CoWdCAYTLEwgfBcyX6SHr5bwEf4tJc",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let filtro="todo";

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginDiv.style.display="none";
app.style.display="block";
cargar();
})
.catch(e=>alert(e.message));
}

function registrar(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){
if(confirm("¿Cerrar sesión?")){
auth.signOut();
location.reload();
}
}

function mostrar(id){
["dashboard","vender","inventario","historial","clientes"].forEach(s=>{
document.getElementById(s).style.display="none";
});
document.getElementById(id).style.display="block";
}

async function agregar(){
let file=imagen.files[0];
let img="";

if(file){
let reader=new FileReader();
reader.readAsDataURL(file);
await new Promise(res=>reader.onload=()=>{img=reader.result;res();});
}

db.collection("productos").add({
nombre:producto.value,
cantidad:Number(cantidad.value)||0,
compra:Number(compra.value)||0,
venta:Number(venta.value)||0,
imagen:img
});

alert("Producto agregado");

producto.value="";
cantidad.value="";
compra.value="";
venta.value="";
imagen.value="";

cargar();
}

function venderProducto(id,venta,nombre){
if(confirm("¿Confirmar venta?")){
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();

if(d.cantidad>0){
db.collection("productos").doc(id).update({cantidad:d.cantidad-1});

db.collection("movimientos").add({
tipo:"venta",
monto:Number(venta)||0,
fecha:Date.now(),
nombre:nombre
});

cargar();
}
});
}
}

function comprar(id,precio){
let c=Number(prompt("Cantidad"))||0;

db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();

db.collection("productos").doc(id).update({
cantidad:d.cantidad+c
});

db.collection("movimientos").add({
tipo:"gasto",
monto:(Number(precio)||0)*c,
fecha:Date.now()
});

cargar();
});
}

function eliminar(id){
if(confirm("¿Eliminar producto?")){
db.collection("productos").doc(id).delete();
cargar();
}
}

function cargar(){
db.collection("productos").get().then(snap=>{
productosVenta.innerHTML="";
tabla.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

productosVenta.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
S/ ${d.venta}<br>
Stock: ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}')">Vender</button>
</div>`;

tabla.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
Stock: ${d.cantidad}<br>
<button onclick="comprar('${doc.id}',${d.compra})">+ Stock</button>
<button onclick="eliminar('${doc.id}')">❌ Eliminar</button>
</div>`;
});

calcular();
});

db.collection("movimientos").get().then(snap=>{
listaHistorial.innerHTML="";
let total=0;
let now=Date.now();

snap.forEach(doc=>{
let d=doc.data();
let diff=now-(d.fecha||0);

if(filtro=="hoy" && diff>86400000) return;
if(filtro=="semana" && diff>604800000) return;
if(filtro=="mes" && diff>2592000000) return;

total+=Number(d.monto)||0;

listaHistorial.innerHTML+=`
<div class="card">
${d.nombre||"Gasto"}<br>
S/ ${d.monto}
</div>`;
});

listaHistorial.innerHTML+="<h3>Total: "+total+"</h3>";
});

cargarClientes();
}

function calcular(){
db.collection("movimientos").get().then(snap=>{
let v=0,g=0;

snap.forEach(doc=>{
let d=doc.data();
if(d.tipo=="venta") v+=Number(d.monto)||0;
else g+=Number(d.monto)||0;
});

ventas.innerText=v;
gastos.innerText=g;
ganancia.innerText=v-g;
});
}

function filtrar(){
let t=buscar.value.toLowerCase();

db.collection("productos").get().then(snap=>{
productosVenta.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

if(d.nombre.toLowerCase().includes(t)){
productosVenta.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
S/ ${d.venta}<br>
Stock: ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta},'${d.nombre}')">Vender</button>
</div>`;
}
});
});
}

function guardarCliente(){
db.collection("clientes").add({
nombre:nombreCliente.value,
deuda:Number(deudaCliente.value)||0
});

nombreCliente.value="";
deudaCliente.value="";
cargarClientes();
}

function cargarClientes(){
db.collection("clientes").get().then(snap=>{
listaClientes.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

listaClientes.innerHTML+=`
<div class="card">
${d.nombre}<br>
Debe: S/ ${d.deuda}<br>
<button onclick="pagar('${doc.id}')">Ya pagó</button>
</div>`;
});
});
}

function pagar(id){
db.collection("clientes").doc(id).delete();
cargarClientes();
}
</script>

</body>
</html>

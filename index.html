<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILO APP PRO</title>

<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa;}

h2{font-size:22px;}
h3{font-size:18px;}

input{
width:95%;
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

.product{
background:#fff;
padding:10px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

img{width:80px;height:80px;border-radius:10px;}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#fff;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
align-items:center;
}

.bottom-nav button{
flex:1;
background:none;
}

.content{padding:15px;padding-bottom:90px;}
</style>
</head>

<body>

<div class="content">

<div id="login">
<h2>🔐 Iniciar sesión</h2>
<input id="email" placeholder="Correo">
<input id="password" placeholder="Contraseña" type="password">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrarse</button>
</div>

<div id="app" style="display:none;">

<div id="dashboard">
<h2>📊 Dashboard</h2>
<p>💰 Ventas: <span id="ventas">0</span></p>
<p>💸 Gastos: <span id="gastos">0</span></p>
<p>📈 Ganancia: <span id="ganancia">0</span></p>
</div>

<div id="vender" style="display:none;">
<h2>💰 Vender</h2>
<input id="buscar" placeholder="Buscar..." oninput="filtrar()">
<div class="grid" id="productosVenta"></div>
</div>

<div id="inventario" style="display:none;">
<h2>📦 Inventario</h2>

<input id="producto" placeholder="Nombre producto">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Precio compra">
<input id="venta" type="number" placeholder="Precio venta">
<input type="file" id="imagen">
<button onclick="agregar()">Agregar producto</button>

<div class="grid" id="tabla"></div>
</div>

</div>
</div>

<div class="bottom-nav">
<button onclick="mostrar('dashboard')">📊</button>
<button onclick="mostrar('vender')">💰</button>
<button onclick="mostrar('inventario')">📦</button>
<button onclick="logout()">🚪</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDA0CoWdCAYTLEwgfBcyX6SHr5bwEf4tJc",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

auth.onAuthStateChanged(user=>{
if(user){
login.style.display="none";
app.style.display="block";
cargar();
}else{
login.style.display="block";
app.style.display="none";
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function registrar(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

function mostrar(id){
dashboard.style.display="none";
vender.style.display="none";
inventario.style.display="none";
document.getElementById(id).style.display="block";
}

function convertirBase64(file){
return new Promise(res=>{
const reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>res(reader.result);
});
}

async function agregar(){
let file=imagen.files[0];
let img="";
if(file){img=await convertirBase64(file);}

db.collection("productos").add({
nombre:producto.value,
cantidad:Number(cantidad.value)||0,
compra:Number(compra.value)||0,
venta:Number(venta.value)||0,
imagen:img
});
cargar();
}

function cargar(){
db.collection("productos").get().then(snap=>{
productosVenta.innerHTML="";
tabla.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

productosVenta.innerHTML+=`
<div class="product">
<img src="${d.imagen||'https://via.placeholder.com/100'}"><br>
<b>${d.nombre}</b><br>
💰 S/ ${d.venta}<br>
📦 ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta})">Vender</button>
</div>`;

tabla.innerHTML+=`
<div class="product">
<b>${d.nombre}</b><br>
💸 Compra: S/ ${d.compra}<br>
💰 Venta: S/ ${d.venta}<br>
📦 Stock: ${d.cantidad}<br>
<button onclick="comprar('${doc.id}',${d.compra})">+ Comprar</button>
</div>`;
});

calcular();
});
}

function venderProducto(id,venta){
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();
if(d.cantidad>0){
db.collection("productos").doc(id).update({cantidad:d.cantidad-1});
db.collection("movimientos").add({tipo:"venta",monto:venta});
cargar();
}
});
}

function comprar(id,precio){
let c=Number(prompt("Cantidad"))||0;
db.collection("productos").doc(id).get().then(doc=>{
let d=doc.data();
db.collection("productos").doc(id).update({cantidad:d.cantidad+c});
db.collection("movimientos").add({tipo:"gasto",monto:precio*c});
cargar();
});
}

function calcular(){
db.collection("movimientos").get().then(snap=>{
let ventasT=0;
let gastosT=0;

snap.forEach(doc=>{
let d=doc.data();
if(d.tipo=="venta") ventasT+=Number(d.monto);
else gastosT+=Number(d.monto);
});

ventas.innerText=ventasT;
gastos.innerText=gastosT;
ganancia.innerText=ventasT-gastosT;
});
}

function filtrar(){
let t=buscar.value.toLowerCase();
db.collection("productos").get().then(snap=>{
productosVenta.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
if(d.nombre.toLowerCase().includes(t)){
productosVenta.innerHTML+=`
<div class="product">
<b>${d.nombre}</b><br>
💰 ${d.venta}<br>
📦 ${d.cantidad}<br>
<button onclick="venderProducto('${doc.id}',${d.venta})">Vender</button>
</div>`;
}
});
});
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>

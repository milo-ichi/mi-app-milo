<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MILO APP PRO MAX</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa;transition:0.3s;}
.dark{background:#1e1e1e;color:white;}

.card{
background:white;
padding:10px;
border-radius:12px;
margin:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
.dark .card{background:#2c2c2c;}

button{
padding:10px;margin:5px;border:none;border-radius:10px;
background:#4CAF50;color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

img{width:80px;height:80px;border-radius:10px;}

.bottom-nav{
position:fixed;bottom:0;width:100%;display:flex;background:#fff;
}
.bottom-nav button{flex:1;background:none;}
.dark .bottom-nav{background:#2c2c2c;}

.content{padding:15px;padding-bottom:90px;}
</style>
</head>

<body>

<div class="content">

<div id="loginDiv">
<h2>Login</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Registrar</button>
</div>

<div id="app" style="display:none;">

<div id="dashboard">
<h2>Dashboard</h2>
<p>Ventas: <span id="ventas">0</span></p>
<p>Gastos: <span id="gastos">0</span></p>
<p>Ganancia: <span id="ganancia">0</span></p>

<button onclick="toggleModo()">🌙/☀️</button>

<canvas id="grafico"></canvas>

<h3>👑 Creador MILO</h3>
</div>

<div id="inventario" style="display:none;">
<h2>Inventario</h2>

<input id="producto" placeholder="Nombre">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="compra" type="number" placeholder="Compra">
<input id="venta" type="number" placeholder="Venta">
<input type="file" id="imagen">

<button onclick="agregar()">Agregar</button>
<button onclick="generarPDF()">📄 PDF</button>

<div class="grid" id="tabla"></div>
</div>

<div id="clientes" style="display:none;">
<h2>Clientes</h2>

<input id="nombreCliente" placeholder="Nombre">
<input id="deudaCliente" type="number" placeholder="Monto">
<button onclick="guardarCliente()">Guardar</button>

<div id="listaClientes"></div>
</div>

</div>
</div>

<div class="bottom-nav">
<button onclick="mostrar('dashboard')">📊</button>
<button onclick="mostrar('inventario')">📦</button>
<button onclick="mostrar('clientes')">👥</button>
<button onclick="logout()">🚪</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDA0CoWdCAYTLEwgfBcyX6SHr5bwEf4tJc",
authDomain:"inventario-6562e.firebaseapp.com",
projectId:"inventario-6562e"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginDiv.style.display="none";
app.style.display="block";
cargar();
})
.catch(e=>alert(e.message));
}

function registrar(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
location.reload();
}

function mostrar(id){
["dashboard","inventario","clientes"].forEach(s=>{
document.getElementById(s).style.display="none";
});
document.getElementById(id).style.display="block";
}

function toggleModo(){
document.body.classList.toggle("dark");
}

async function agregar(){
let file=imagen.files[0];
let img="";

if(file){
let reader=new FileReader();
reader.readAsDataURL(file);
await new Promise(r=>reader.onload=()=>{img=reader.result;r();});
}

db.collection("productos").add({
nombre:producto.value,
cantidad:Number(cantidad.value)||0,
compra:Number(compra.value)||0,
venta:Number(venta.value)||0,
imagen:img
});

producto.value="";cantidad.value="";compra.value="";venta.value="";
cargar();
}

function cargar(){
db.collection("productos").get().then(snap=>{
tabla.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

tabla.innerHTML+=`
<div class="card">
<img src="${d.imagen||''}">
<b>${d.nombre}</b><br>
Stock: ${d.cantidad}<br>
<button onclick="eliminar('${doc.id}')">❌</button>
</div>`;
});
});

cargarClientes();
grafica();
}

function eliminar(id){
if(confirm("Eliminar producto?")){
db.collection("productos").doc(id).delete();
cargar();
}
}

function guardarCliente(){
db.collection("clientes").add({
nombre:nombreCliente.value,
deuda:Number(deudaCliente.value)||0
});
cargarClientes();
}

function cargarClientes(){
db.collection("clientes").get().then(snap=>{
listaClientes.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

listaClientes.innerHTML+=`
<div class="card">
${d.nombre}<br>
Debe: ${d.deuda}<br>
<button onclick="pagar('${doc.id}')">Ya pagó</button>
</div>`;
});
});
}

function pagar(id){
db.collection("clientes").doc(id).delete();
cargarClientes();
}

function grafica(){
db.collection("movimientos").get().then(snap=>{
let dias={};

snap.forEach(doc=>{
let d=doc.data();
let fecha=new Date(d.fecha||Date.now()).toLocaleDateString();

if(d.tipo=="venta"){
dias[fecha]=(dias[fecha]||0)+d.monto;
}
});

let labels=Object.keys(dias);
let data=Object.values(dias);

new Chart(document.getElementById("grafico"),{
type:"line",
data:{labels:labels,datasets:[{label:"Ventas",data:data}]}
});
});
}

function generarPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

db.collection("productos").get().then(snap=>{
let x=10,y=10,count=0;

snap.forEach(docu=>{
let d=docu.data();

doc.text(d.nombre,x,y);
y+=10;
count++;

if(count%4==0){
doc.addPage();
y=10;
}
});

doc.save("catalogo.pdf");
});
}
</script>

</body>
</html>
